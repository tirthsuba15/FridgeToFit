name: CI

on:
  push:
    branches: [ main, p1/setup, p2/backend, p3/frontend, p4/feature ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install --prefer-offline --no-audit
      continue-on-error: true
    - name: Run tests
      run: npm test
      continue-on-error: true
